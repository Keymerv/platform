<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="profile-page-title">Keymerv | البروفايل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between items-center p-4 sm:p-6">

    <main class="w-full max-w-md mx-auto my-auto space-y-6">

        <div class="flex justify-between items-center px-2">
            <button onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-indigo-400 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-2">
                <i class="fa-solid fa-globe"></i> <span id="lang-text">English</span>
            </button>
            <button onclick="shareProfile()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-slate-300 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-share-nodes"></i> <span data-i18n="share">مشاركة</span>
            </button>
        </div>

        <!-- بطاقة البروفايل (صورة بالأعلى، تحتها الاسم مباشرة بدون يوزرنيم، ثم البايو) -->
        <div class="bg-slate-800/80 border border-slate-700/80 p-6 rounded-3xl text-center shadow-2xl backdrop-blur-md space-y-3">
            <div id="profile-avatar" class="w-24 h-24 mx-auto rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 text-white font-extrabold text-3xl flex items-center justify-center border-4 border-slate-700 shadow-xl overflow-hidden">K</div>
            <h1 id="profile-name" class="text-xl font-bold text-slate-100">جاري التحميل...</h1>
            <p id="profile-bio" class="text-xs text-slate-400 leading-relaxed px-2"></p>
        </div>

        <!-- التصنيفات والروابط بترتيب 4 في كل صف (أيقونات شبكية) -->
        <div id="dynamic-sections-container" class="space-y-4"></div>

    </main>

    <footer class="mt-8 text-center space-y-2">
        <p id="watermark-text" class="text-[10px] text-slate-500 font-medium tracking-wider uppercase opacity-70">Created by Keymerv</p>
        <a href="index.html" class="inline-flex items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
            <div class="w-5 h-5 bg-indigo-600 rounded-md flex items-center justify-center text-[10px] font-black text-white">K</div>
            <span class="text-xs text-slate-400 font-bold">Keymerv</span>
        </a>
    </footer>

    <script type="module">
        import { supabase } from './assets/js/supabase-config.js';

        let targetUser = null;
        let currentLang = 'ar';

        const translations = {
            ar: { share: "مشاركة", watermark: "Created by Keymerv" },
            en: { share: "Share", watermark: "Created by Keymerv" }
        };

        const platformIcons = {
            x: { icon: 'fa-brands fa-x-twitter', name: 'X' },
            instagram: { icon: 'fa-brands fa-instagram', name: 'Instagram' },
            snapchat: { icon: 'fa-brands fa-snapchat', name: 'Snapchat' },
            tiktok: { icon: 'fa-brands fa-tiktok', name: 'TikTok' },
            youtube: { icon: 'fa-brands fa-youtube', name: 'YouTube' },
            facebook: { icon: 'fa-brands fa-facebook', name: 'Facebook' },
            whatsapp: { icon: 'fa-brands fa-whatsapp', name: 'WhatsApp' },
            telegram: { icon: 'fa-brands fa-telegram', name: 'Telegram' },
            linkedin: { icon: 'fa-brands fa-linkedin', name: 'LinkedIn' },
            threads: { icon: 'fa-brands fa-threads', name: 'Threads' },
            jaco: { icon: 'fa-solid fa-video', name: 'Jaco' },
            twitch: { icon: 'fa-brands fa-twitch', name: 'Twitch' },
            spotify: { icon: 'fa-brands fa-spotify', name: 'Spotify' },
            discord: { icon: 'fa-brands fa-discord', name: 'Discord' },
            github: { icon: 'fa-brands fa-github', name: 'GitHub' },
            reddit: { icon: 'fa-brands fa-reddit', name: 'Reddit' },
            pinterest: { icon: 'fa-brands fa-pinterest', name: 'Pinterest' },
            patreon: { icon: 'fa-brands fa-patreon', name: 'Patreon' },
            substack: { icon: 'fa-solid fa-pen-nib', name: 'Substack' },
            medium: { icon: 'fa-brands fa-medium', name: 'Medium' }
        };

        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('u');
            if (!username) return;

            const { data: profile } = await supabase.from('users_profiles').select('*').eq('username', username.trim()).single();
            if (!profile) return;

            targetUser = profile;
            document.getElementById('profile-name').textContent = profile.display_name || profile.username;
            
            const avatarEl = document.getElementById('profile-avatar');
            if (profile.avatar_url) {
                avatarEl.innerHTML = `<img src="${profile.avatar_url}" class="w-full h-full object-cover">`;
            } else {
                avatarEl.textContent = (profile.display_name || profile.username)[0].toUpperCase();
            }

            updateBioAndUI();
            renderProfileSections();
        }

        window.updateBioAndUI = function() {
            if (!targetUser) return;
            document.getElementById('profile-bio').textContent = currentLang === 'en' ? (targetUser.bio_en || "") : (targetUser.bio || "");
            document.getElementById('watermark-text').textContent = translations[currentLang].watermark;
            document.querySelector('[data-i18n="share"]').textContent = translations[currentLang].share;
        }

        async function renderProfileSections() {
            if (!targetUser) return;
            const container = document.getElementById('dynamic-sections-container');
            container.innerHTML = "";

            const orderList = [targetUser.order_1 || 'social', targetUser.order_2 || 'custom_links'];

            for (const sectionKey of orderList) {
                if (sectionKey === 'social' && (targetUser.show_links ?? true)) {
                    let socialHtml = '';
                    Object.keys(platformIcons).forEach(key => {
                        if (targetUser[key]) {
                            const p = platformIcons[key];
                            socialHtml += `<a href="${targetUser[key]}" target="_blank" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 p-3.5 rounded-2xl flex flex-col items-center justify-center gap-1.5 transition-all shadow-md text-slate-200"><i class="${p.icon} text-xl text-indigo-400"></i><span class="text-[10px] font-bold truncate w-full text-center">${p.name}</span></a>`;
                        }
                    });
                    if (socialHtml) {
                        container.innerHTML += `<div class="grid grid-cols-4 gap-2.5">${socialHtml}</div>`;
                    }
                } else if (sectionKey === 'custom_links' && (targetUser.show_links ?? true)) {
                    const { data: links } = await supabase.from('links').select('*').eq('user_id', targetUser.id);
                    if (links && links.length > 0) {
                        let linksHtml = links.map(l => `<a href="${l.url}" target="_blank" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 p-3.5 rounded-2xl flex flex-col items-center justify-center gap-1.5 transition-all shadow-md text-slate-200"><i class="fa-solid fa-link text-xl text-purple-400"></i><span class="text-[10px] font-bold truncate w-full text-center">${l.title}</span></a>`).join('');
                        container.innerHTML += `<div class="grid grid-cols-4 gap-2.5">${linksHtml}</div>`;
                    }
                } else if (sectionKey === 'store' && (targetUser.show_store ?? true)) {
                    const { data: products } = await supabase.from('products').select('*').eq('user_id', targetUser.id);
                    if (products && products.length > 0) {
                        let storeHtml = products.map(p => `<div class="bg-slate-800 border border-slate-700 p-3 rounded-2xl flex flex-col items-center text-center shadow-md"><h4 class="font-bold text-xs text-slate-100 truncate w-full">${p.title}</h4><span class="text-[10px] text-indigo-400 font-bold mt-1">${p.price} ر.س</span></div>`).join('');
                        container.innerHTML += `<div class="grid grid-cols-2 gap-2.5">${storeHtml}</div>`;
                    }
                } else if (sectionKey === 'branches' && (targetUser.show_branches ?? true)) {
                    const { data: branches } = await supabase.from('branches').select('*').eq('owner_id', targetUser.id);
                    if (branches && branches.length > 0) {
                        let branchHtml = branches.map(b => `<div class="bg-slate-800 border border-slate-700 p-3 rounded-2xl flex flex-col items-center text-center shadow-md"><h4 class="font-bold text-xs text-slate-100 truncate w-full">${b.branch_name || b.name}</h4><span class="text-[10px] text-slate-400 mt-1">${b.city}</span></div>`).join('');
                        container.innerHTML += `<div class="grid grid-cols-2 gap-2.5">${branchHtml}</div>`;
                    }
                }
            }
        }

        window.toggleLanguage = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('lang-text').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            updateBioAndUI();
            renderProfileSections();
        };

        window.shareProfile = () => {
            if (navigator.share) navigator.share({ title: targetUser?.display_name, url: window.location.href });
            else { navigator.clipboard.writeText(window.location.href); alert("تم النسخ!"); }
        };

        initProfile();
    </script>
</body>
</html>
