<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keymerv | البروفايل العام</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Tajawal) -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between items-center p-4 sm:p-6">

    <!-- Container الرئيسي للبروفايل -->
    <main class="w-full max-w-md mx-auto my-auto space-y-6">

        <!-- زر تحويل اللغة والمشاركة العلوي -->
        <div class="flex justify-between items-center px-2">
            <button id="lang-toggle" onclick="toggleLanguage()" class="bg-slate-900/80 hover:bg-slate-800 border border-slate-800 text-xs text-indigo-400 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-2">
                <i class="fa-solid fa-globe"></i> <span id="lang-text">English</span>
            </button>
            <button onclick="shareProfile()" class="bg-slate-900/80 hover:bg-slate-800 border border-slate-800 text-xs text-slate-300 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-share-nodes"></i> مشاركة
            </button>
        </div>

        <!-- بطاقة بيانات البروفايل Header Card -->
        <div class="bg-slate-900/80 border border-slate-800/80 p-6 rounded-3xl text-center shadow-2xl backdrop-blur-md">
            <div id="profile-avatar" class="w-24 h-24 mx-auto rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 text-white font-extrabold text-3xl flex items-center justify-center border-4 border-slate-800 shadow-xl mb-4">
                K
            </div>
            <h1 id="profile-name" class="text-xl font-bold text-slate-100">جاري التحميل...</h1>
            <p id="profile-username" class="text-xs text-indigo-400 font-mono mt-1">@username</p>
            <p id="profile-bio" class="text-xs text-slate-400 mt-3 leading-relaxed px-2">...</p>
        </div>

        <!-- أزرار التبديل بين الأقسام Navigation -->
        <div class="flex bg-slate-900/90 border border-slate-800 p-1.5 rounded-2xl gap-1">
            <button onclick="switchTab('links')" id="btn-tab-links" class="tab-btn flex-1 py-2 text-xs font-bold rounded-xl bg-indigo-600 text-white transition-all flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-link"></i> <span data-i18n="tab_links">الروابط</span>
            </button>
            <button onclick="switchTab('store')" id="btn-tab-store" class="tab-btn flex-1 py-2 text-xs font-bold rounded-xl text-slate-400 hover:text-white transition-all flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-store"></i> <span data-i18n="tab_store">المتجر</span>
            </button>
            <button onclick="switchTab('branches')" id="btn-tab-branches" class="tab-btn flex-1 py-2 text-xs font-bold rounded-xl text-slate-400 hover:text-white transition-all flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-code-branch"></i> <span data-i18n="tab_branches">الفروع</span>
            </button>
        </div>

        <!-- 1. قسم الروابط (Links Section) -->
        <section id="sec-links" class="tab-sec space-y-3">
            <div id="links-container" class="space-y-3">
                <div class="text-center py-6 text-slate-600 text-xs">جاري تحميل الروابط...</div>
            </div>
        </section>

        <!-- 2. قسم المتجر (Store Section) -->
        <section id="sec-store" class="tab-sec hidden space-y-3">
            <div id="store-container" class="grid grid-cols-1 gap-3">
                <div class="text-center py-6 text-slate-600 text-xs">جاري تحميل المنتجات...</div>
            </div>
        </section>

        <!-- 3. قسم الفروع (Branches Section) -->
        <section id="sec-branches" class="tab-sec hidden space-y-3">
            <div id="branches-container" class="space-y-3">
                <div class="text-center py-6 text-slate-600 text-xs">جاري تحميل الفروع...</div>
            </div>
        </section>

    </main>

    <!-- Footer Branding -->
    <footer class="mt-8 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
            <div class="w-5 h-5 bg-indigo-600 rounded-md flex items-center justify-center text-[10px] font-black text-white">K</div>
            <span class="text-xs text-slate-400 font-bold">صُنع بواسطة <span class="text-indigo-400">Keymerv</span></span>
        </a>
    </footer>

    <!-- Supabase Integration Script -->
    <script type="module">
        import { supabase } from './assets/js/supabase-config.js';

        let targetUser = null;
        let currentLang = localStorage.getItem('app_lang') || 'ar';

        const i18n = {
            ar: {
                tab_links: "الروابط",
                tab_store: "المتجر",
                tab_branches: "الفروع",
                no_links: "لا توجد روابط مضافة حتى الآن",
                no_store: "لا توجد منتجات معروضة حالياً",
                no_branches: "لا توجد فروع مضافة حالياً",
                buy_now: "اطلب الآن",
                lang_btn: "English"
            },
            en: {
                tab_links: "Links",
                tab_store: "Store",
                tab_branches: "Branches",
                no_links: "No links added yet",
                no_store: "No products available at the moment",
                no_branches: "No branches added yet",
                buy_now: "Order Now",
                lang_btn: "عربي"
            }
        };

        // 1. تحديد المستخدم المستهدف من الـ URL (مثال: ?u=ahmed_ali)
        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('u');

            if (!username) {
                document.getElementById('profile-name').textContent = "حساب غير موجود";
                return;
            }

            // جلب البروفايل من Supabase
            const { data: profile, error } = await supabase
                .from('users_profiles')
                .select('*')
                .eq('username', username.toLowerCase())
                .single();

            if (error || !profile) {
                document.getElementById('profile-name').textContent = "المستخدم غير موجود";
                document.getElementById('profile-username').textContent = "@not_found";
                return;
            }

            targetUser = profile;

            // تحديث واجهة المستخدم
            document.getElementById('profile-name').textContent = profile.display_name || profile.username;
            document.getElementById('profile-username').textContent = `@${profile.username}`;
            document.getElementById('profile-bio').textContent = profile.bio || '';
            document.getElementById('profile-avatar').textContent = (profile.display_name || profile.username)[0].toUpperCase();

            // جلب المحتوى
            loadLinks();
            loadProducts();
            loadBranches();
            applyLanguage(currentLang);
        }

        // جلب الروابط
        async function loadLinks() {
            const container = document.getElementById('links-container');
            const { data: links } = await supabase.from('links').select('*').eq('user_id', targetUser.id).order('created_at', { ascending: false });

            if (!links || links.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-slate-500 text-xs">${i18n[currentLang].no_links}</div>`;
                return;
            }

            container.innerHTML = links.map(link => `
                <a href="${link.url}" target="_blank" class="block w-full bg-slate-900/90 hover:bg-slate-800/80 border border-slate-800 p-4 rounded-2xl text-center font-bold text-sm text-slate-200 transition-all hover:scale-[1.02] shadow-lg">
                    ${link.title}
                </a>
            `).join('');
        }

        // جلب المنتجات
        async function loadProducts() {
            const container = document.getElementById('store-container');
            const { data: products } = await supabase.from('products').select('*').eq('user_id', targetUser.id).order('created_at', { ascending: false });

            if (!products || products.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-slate-500 text-xs">${i18n[currentLang].no_store}</div>`;
                return;
            }

            container.innerHTML = products.map(prod => `
                <div class="bg-slate-900/90 border border-slate-800 p-4 rounded-2xl flex justify-between items-center gap-4 shadow-lg">
                    <div class="space-y-1">
                        <h3 class="font-bold text-sm text-slate-100">${prod.title}</h3>
                        <p class="text-xs text-slate-400">${prod.description || ''}</p>
                        <span class="inline-block text-xs font-bold text-indigo-400">${prod.price} ر.س</span>
                    </div>
                    <a href="https://wa.me/?text=مرحباً، أود طلب منتج: ${encodeURIComponent(prod.title)}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl transition-all shrink-0">
                        ${i18n[currentLang].buy_now}
                    </a>
                </div>
            `).join('');
        }

        // جلب الفروع
        async function loadBranches() {
            const container = document.getElementById('branches-container');
            const { data: branches } = await supabase.from('branches').select('*').eq('owner_id', targetUser.id).order('created_at', { ascending: false });

            if (!branches || branches.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-slate-500 text-xs">${i18n[currentLang].no_branches}</div>`;
                return;
            }

            container.innerHTML = branches.map(b => `
                <div class="bg-slate-900/90 border border-slate-800 p-4 rounded-2xl flex justify-between items-center shadow-lg">
                    <div>
                        <h3 class="font-bold text-sm text-slate-100">${b.branch_name}</h3>
                        <p class="text-xs text-slate-400 mt-1"><i class="fa-solid fa-location-dot text-indigo-400"></i> ${b.city}</p>
                    </div>
                    <div class="flex gap-2">
                        ${b.phone ? `<a href="tel:${b.phone}" class="bg-slate-800 hover:bg-slate-700 text-slate-200 p-2.5 rounded-xl text-xs"><i class="fa-solid fa-phone"></i></a>` : ''}
                        ${b.location_url ? `<a href="${b.location_url}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2.5 rounded-xl text-xs"><i class="fa-solid fa-map-location-dot"></i></a>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // التبديل بين الأقسام
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-sec').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('text-slate-400');
            });

            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`btn-tab-${tab}`);
            activeBtn.classList.add('bg-indigo-600', 'text-white');
            activeBtn.classList.remove('text-slate-400');
        };

        // مشاركة البروفايل
        window.shareProfile = () => {
            if (navigator.share) {
                navigator.share({
                    title: targetUser?.display_name || 'Keymerv Profile',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("تم نسخ رابط البروفايل للحافظة!");
            }
        };

        // إدارة اللغة
        window.toggleLanguage = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('app_lang', currentLang);
            applyLanguage(currentLang);
        };

        function applyLanguage(lang) {
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-text').textContent = i18n[lang].lang_btn;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
        }

        initProfile();
    </script>
</body>
</html>
