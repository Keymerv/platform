<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="profile-page-title">Keymerv | البروفايل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between items-center p-4 sm:p-6">

    <main class="w-full max-w-md mx-auto my-auto space-y-6">

        <!-- الأزرار العلوية -->
        <div class="flex justify-between items-center px-2">
            <button onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-indigo-400 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-2">
                <i class="fa-solid fa-globe"></i> <span id="lang-text">English</span>
            </button>
            <button onclick="shareProfile()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-slate-300 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-share-nodes"></i> <span data-i18n="share">مشاركة</span>
            </button>
        </div>

        <!-- بطاقة البروفايل -->
        <div class="bg-slate-800/80 border border-slate-700/80 p-6 rounded-3xl text-center shadow-2xl backdrop-blur-md">
            <div id="profile-avatar" class="w-24 h-24 mx-auto rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 text-white font-extrabold text-3xl flex items-center justify-center border-4 border-slate-700 shadow-xl mb-4">K</div>
            <h1 id="profile-name" class="text-xl font-bold text-slate-100">جاري التحميل...</h1>
            <p id="profile-username" class="text-xs text-indigo-400 font-mono mt-1">@username</p>
            <p id="profile-bio" class="text-xs text-slate-400 mt-3 leading-relaxed px-2"></p>
        </div>

        <!-- أزرار التبويبات العلوية -->
        <div id="tabs-navigation" class="grid gap-2 bg-slate-800/40 p-1.5 rounded-2xl border border-slate-700/60"></div>

        <!-- محتوى التبويبات -->
        <div id="tab-content-container">
            <div id="content-links" class="profile-content space-y-3 hidden"></div>
            <div id="content-store" class="profile-content space-y-3 hidden"></div>
            <div id="content-branches" class="profile-content space-y-3 hidden"></div>
            <div id="content-contact" class="profile-content space-y-3 hidden"></div>
        </div>

    </main>

    <!-- العلامة المائية الثابتة في الأسفل -->
    <footer class="mt-8 text-center space-y-2">
        <p id="watermark-text" class="text-[10px] text-slate-500 font-medium tracking-wider uppercase opacity-70">انضم إلى منصة كيميرف</p>
        <a href="index.html" class="inline-flex items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
            <div class="w-5 h-5 bg-indigo-600 rounded-md flex items-center justify-center text-[10px] font-black text-white">K</div>
            <span class="text-xs text-slate-400 font-bold">Keymerv</span>
        </a>
    </footer>

    <script type="module">
        import { supabase } from './assets/js/supabase-config.js';

        let targetUser = null;
        let currentLang = 'ar';
        let availableTabs = [];

        const translations = {
            ar: { share: "مشاركة", watermark: "انضم إلى منصة كيميرف", links: "الروابط", store: "المتجر", branches: "الفروع", contact: "تواصل" },
            en: { share: "Share", watermark: "Join Keymerv Platform", links: "Links", store: "Store", branches: "Branches", contact: "Contact" }
        };

        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('u');
            if (!username) return;

            const { data: profile } = await supabase.from('users_profiles').select('*').eq('username', username.trim()).single();
            if (!profile) return;

            targetUser = profile;
            document.getElementById('profile-name').textContent = profile.display_name || profile.username;
            document.getElementById('profile-username').textContent = `@${profile.username}`;
            document.getElementById('profile-avatar').textContent = (profile.display_name || profile.username)[0].toUpperCase();
            
            updateBioAndUI();
            loadProfileData();
        }

        window.updateBioAndUI = function() {
            if (!targetUser) return;
            if (currentLang === 'en') {
                document.getElementById('profile-bio').textContent = targetUser.bio_en || "";
            } else {
                document.getElementById('profile-bio').textContent = targetUser.bio || "";
            }

            const t = translations[currentLang];
            document.getElementById('watermark-text').textContent = t.watermark;
            document.querySelector('[data-i18n="share"]').textContent = t.share;
        }

        async function loadProfileData() {
            if (!targetUser) return;
            availableTabs = [];
            const t = translations[currentLang];

            // 1. الروابط
            if (targetUser.show_links ?? true) {
                const { data: links } = await supabase.from('links').select('*').eq('user_id', targetUser.id);
                if (links) {
                    availableTabs.push({ id: 'links', label: `${t.links} (${links.length})`, icon: 'fa-link' });
                    document.getElementById('content-links').innerHTML = links.length ? links.map(l => `<a href="${l.url}" target="_blank" class="block w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 p-4 rounded-2xl text-center font-bold text-sm text-slate-200 transition-all shadow-lg">${l.title}</a>`).join('') : '<div class="text-center text-xs text-slate-500 py-4">لا توجد روابط</div>';
                }
            }

            // 2. المتجر
            if (targetUser.show_store ?? true) {
                const { data: products } = await supabase.from('products').select('*').eq('user_id', targetUser.id);
                if (products) {
                    availableTabs.push({ id: 'store', label: `${t.store} (${products.length})`, icon: 'fa-store' });
                    document.getElementById('content-store').innerHTML = products.length ? products.map(p => `
                        <div class="bg-slate-800 border border-slate-700 p-4 rounded-2xl flex items-center gap-4 shadow-lg">
                            ${p.image_url ? `<img src="${p.image_url}" class="w-16 h-16 rounded-xl object-cover shrink-0">` : ''}
                            <div class="flex-grow overflow-hidden">
                                <h3 class="font-bold text-sm text-slate-100 truncate">${p.title}</h3>
                                <p class="text-xs text-indigo-400 font-bold mt-1">${p.price} ر.س</p>
                            </div>
                        </div>`).join('') : '<div class="text-center text-xs text-slate-500 py-4">لا توجد منتجات</div>';
                }
            }

            // 3. الفروع
            if (targetUser.show_branches ?? true) {
                const { data: branches } = await supabase.from('branches').select('*').eq('owner_id', targetUser.id);
                if (branches) {
                    availableTabs.push({ id: 'branches', label: `${t.branches} (${branches.length})`, icon: 'fa-code-branch' });
                    document.getElementById('content-branches').innerHTML = branches.length ? branches.map(b => `
                        <div class="bg-slate-800 border border-slate-700 p-4 rounded-2xl flex justify-between items-center shadow-lg">
                            <div>
                                <h3 class="font-bold text-sm text-slate-100">${b.branch_name}</h3>
                                <p class="text-xs text-slate-400 mt-1"><i class="fa-solid fa-location-dot text-indigo-400"></i> ${b.city}</p>
                            </div>
                        </div>`).join('') : '<div class="text-center text-xs text-slate-500 py-4">لا توجد فروع</div>';
                }
            }

            // 4. التواصل
            if (targetUser.show_contact ?? true) {
                availableTabs.push({ id: 'contact', label: t.contact, icon: 'fa-headset' });
                document.getElementById('content-contact').innerHTML = `
                    <div class="space-y-3">
                        ${targetUser.contact_phone ? `<a href="tel:${targetUser.contact_phone}" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl flex items-center justify-between shadow-lg"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-indigo-600/20 text-indigo-400 flex items-center justify-center"><i class="fa-solid fa-phone"></i></div><div><h4 class="font-bold text-sm text-slate-200">Phone</h4><p class="text-xs text-slate-400" dir="ltr">${targetUser.contact_phone}</p></div></div></a>` : ''}
                        ${targetUser.contact_email ? `<a href="mailto:${targetUser.contact_email}" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl flex items-center justify-between shadow-lg"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-purple-600/20 text-purple-400 flex items-center justify-center"><i class="fa-solid fa-envelope"></i></div><div><h4 class="font-bold text-sm text-slate-200">Email</h4><p class="text-xs text-slate-400 truncate" dir="ltr">${targetUser.contact_email}</p></div></div></a>` : ''}
                    </div>`;
            }

            renderTabsNav();
        }

        function renderTabsNav() {
            const nav = document.getElementById('tabs-navigation');
            if (!availableTabs.length) { nav.innerHTML = ''; return; }
            nav.style.gridTemplateColumns = `repeat(${availableTabs.length}, minmax(0, 1fr))`;
            nav.innerHTML = availableTabs.map((tab, idx) => `
                <button onclick="switchTab('${tab.id}')" id="tab-${tab.id}" class="tab-btn py-2.5 px-2 rounded-xl text-xs font-bold transition-all ${idx === 0 ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'} flex items-center justify-center gap-1.5 truncate">
                    <i class="fa-solid ${tab.icon}"></i> <span class="truncate">${tab.label}</span>
                </button>
            `).join('');
            if (availableTabs.length) switchTab(availableTabs[0].id);
        }

        window.switchTab = (id) => {
            document.querySelectorAll('.profile-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => { btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg'); btn.classList.add('text-slate-400'); });
            document.getElementById(`content-${id}`).classList.remove('hidden');
            const btn = document.getElementById(`tab-${id}`);
            if (btn) { btn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg'); btn.classList.remove('text-slate-400'); }
        };

        window.toggleLanguage = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('lang-text').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            updateBioAndUI();
            loadProfileData();
        };

        window.shareProfile = () => {
            if (navigator.share) navigator.share({ title: targetUser?.display_name, url: window.location.href });
            else { navigator.clipboard.writeText(window.location.href); alert("تم النسخ!"); }
        };

        initProfile();
    </script>
</body>
</html>
