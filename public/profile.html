<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keymerv | البروفايل العام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between items-center p-4 sm:p-6">

    <main class="w-full max-w-md mx-auto my-auto space-y-6">

        <!-- الأزرار العلوية -->
        <div class="flex justify-between items-center px-2">
            <button onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-indigo-400 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-2">
                <i class="fa-solid fa-globe"></i> <span id="lang-text">English</span>
            </button>
            <button onclick="shareProfile()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-slate-300 font-bold px-3 py-1.5 rounded-full transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-share-nodes"></i> مشاركة
            </button>
        </div>

        <!-- بطاقة البروفايل -->
        <div class="bg-slate-800/80 border border-slate-700/80 p-6 rounded-3xl text-center shadow-2xl backdrop-blur-md">
            <div id="profile-avatar" class="w-24 h-24 mx-auto rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 text-white font-extrabold text-3xl flex items-center justify-center border-4 border-slate-700 shadow-xl mb-4">
                K
            </div>
            <h1 id="profile-name" class="text-xl font-bold text-slate-100">جاري التحميل...</h1>
            <p id="profile-username" class="text-xs text-indigo-400 font-mono mt-1">@username</p>
            <p id="profile-bio" class="text-xs text-slate-400 mt-3 leading-relaxed px-2">مرحباً بك في صفحتي الشخصية</p>
        </div>

        <!-- العدادات -->
        <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-slate-800/60 border border-slate-700 p-3 rounded-2xl">
                <span id="count-links" class="block text-lg font-bold text-indigo-400">0</span>
                <span class="text-[11px] text-slate-400">روابط</span>
            </div>
            <div class="bg-slate-800/60 border border-slate-700 p-3 rounded-2xl">
                <span id="count-products" class="block text-lg font-bold text-indigo-400">0</span>
                <span class="text-[11px] text-slate-400">منتجات</span>
            </div>
            <div class="bg-slate-800/60 border border-slate-700 p-3 rounded-2xl">
                <span id="count-branches" class="block text-lg font-bold text-indigo-400">0</span>
                <span class="text-[11px] text-slate-400">فروع</span>
            </div>
        </div>

        <!-- 1. قسم الروابط -->
        <section id="sec-links" class="space-y-3 hidden">
            <h2 class="text-sm font-bold text-slate-400 px-1"><i class="fa-solid fa-link text-indigo-400 ml-1"></i> الروابط</h2>
            <div id="links-container" class="space-y-3"></div>
        </section>

        <!-- 2. قسم المتجر -->
        <section id="sec-store" class="space-y-3 hidden">
            <h2 class="text-sm font-bold text-slate-400 px-1"><i class="fa-solid fa-store text-indigo-400 ml-1"></i> المتجر</h2>
            <div id="store-container" class="grid grid-cols-1 gap-3"></div>
        </section>

        <!-- 3. قسم الفروع -->
        <section id="sec-branches" class="space-y-3 hidden">
            <h2 class="text-sm font-bold text-slate-400 px-1"><i class="fa-solid fa-code-branch text-indigo-400 ml-1"></i> الفروع</h2>
            <div id="branches-container" class="space-y-3"></div>
        </section>

    </main>

    <footer class="mt-8 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
            <div class="w-5 h-5 bg-indigo-600 rounded-md flex items-center justify-center text-[10px] font-black text-white">K</div>
            <span class="text-xs text-slate-400 font-bold">صُنع بواسطة <span class="text-indigo-400">Keymerv</span></span>
        </a>
    </footer>

    <script type="module">
        import { supabase } from './assets/js/supabase-config.js';

        let targetUser = null;
        let currentLang = 'ar';

        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('u');

            if (!username) {
                document.getElementById('profile-name').textContent = "حساب غير موجود";
                return;
            }

            const { data: profile, error } = await supabase
                .from('users_profiles')
                .select('*')
                .eq('username', username.trim())
                .single();

            if (error || !profile) {
                document.getElementById('profile-name').textContent = "المستخدم غير موجود";
                document.getElementById('profile-username').textContent = "@not_found";
                return;
            }

            targetUser = profile;

            document.getElementById('profile-name').textContent = profile.display_name || profile.username;
            document.getElementById('profile-username').textContent = `@${profile.username}`;
            document.getElementById('profile-avatar').textContent = (profile.display_name || profile.username)[0].toUpperCase();

            loadProfileData();
        }

        async function loadProfileData() {
            if (!targetUser) return;

            // جلب الروابط
            const { data: links } = await supabase.from('links').select('*').eq('user_id', targetUser.id);
            if (links && links.length > 0) {
                document.getElementById('count-links').textContent = links.length;
                document.getElementById('sec-links').classList.remove('hidden');
                document.getElementById('links-container').innerHTML = links.map(l => `
                    <a href="${l.url}" target="_blank" class="block w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 p-4 rounded-2xl text-center font-bold text-sm text-slate-200 transition-all shadow-lg">
                        ${l.title}
                    </a>
                `).join('');
            }

            // جلب المنتجات
            const { data: products } = await supabase.from('products').select('*').eq('user_id', targetUser.id);
            if (products && products.length > 0) {
                document.getElementById('count-products').textContent = products.length;
                document.getElementById('sec-store').classList.remove('hidden');
                document.getElementById('store-container').innerHTML = products.map(p => `
                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-2xl flex items-center gap-4 shadow-lg">
                        ${p.image_url ? `<img src="${p.image_url}" class="w-16 h-16 rounded-xl object-cover shrink-0 border border-slate-700">` : ''}
                        <div class="flex-grow overflow-hidden">
                            <h3 class="font-bold text-sm text-slate-100 truncate">${p.title}</h3>
                            <p class="text-xs text-slate-400 truncate">${p.description || ''}</p>
                            <span class="inline-block mt-1 text-xs font-bold text-indigo-400">${p.price} ر.س</span>
                        </div>
                        <a href="https://wa.me/?text=مرحباً، أود طلب منتج: ${encodeURIComponent(p.title)}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-3 py-2 rounded-xl shrink-0">
                            اطلب
                        </a>
                    </div>
                `).join('');
            }

            // جلب الفروع (ملاحظة: جدول الفروع يعتمد على owner_id كما ظهر في نسختك الاحتياطية)
            const { data: branches } = await supabase.from('branches').select('*').eq('owner_id', targetUser.id);
            if (branches && branches.length > 0) {
                document.getElementById('count-branches').textContent = branches.length;
                document.getElementById('sec-branches').classList.remove('hidden');
                document.getElementById('branches-container').innerHTML = branches.map(b => `
                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-2xl flex justify-between items-center shadow-lg">
                        <div>
                            <h3 class="font-bold text-sm text-slate-100">${b.branch_name}</h3>
                            <p class="text-xs text-slate-400 mt-1"><i class="fa-solid fa-location-dot text-indigo-400"></i> ${b.city}</p>
                            ${b.phone ? `<p class="text-xs text-slate-400 mt-1" dir="ltr">هاتف: ${b.phone}</p>` : ''}
                        </div>
                        ${b.location_url ? `<a href="${b.location_url}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2.5 rounded-xl text-xs"><i class="fa-solid fa-map-location-dot"></i> الخريطة</a>` : ''}
                    </div>
                `).join('');
            }
        }

        window.shareProfile = () => {
            if (navigator.share) {
                navigator.share({ title: targetUser?.display_name, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("تم نسخ رابط البروفايل!");
            }
        };

        window.toggleLanguage = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('lang-text').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        };

        initProfile();
    </script>
</body>
</html>
